<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Isapalooza 25ª Edição</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
      overflow-x: hidden;
      background: #000;
    }

    .fixed-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      background-image: url("BACKGROUND.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      animation: zoomBg 24s ease-in-out infinite alternate;
    }

    @keyframes zoomBg {
      from { transform: scale(1); }
      to { transform: scale(1.07); }
    }

    .hero {
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 36px 20px;
      position: relative;
    }

    .logo {
      width: min(82vw, 480px);
      max-height: 84svh;
      object-fit: contain;
      animation: floatLogo 4s ease-in-out infinite;
      filter: drop-shadow(0 16px 28px rgba(0,0,0,0.35));
    }

    @keyframes floatLogo {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .scroll {
      position: absolute;
      bottom: 26px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      text-shadow: 0 2px 8px rgba(0,0,0,0.45);
      animation: bounce 1.8s infinite;
      white-space: nowrap;
    }

    @keyframes bounce {
      0%, 100% { transform: translate(-50%, 0); }
      50% { transform: translate(-50%, 8px); }
    }

    .form-section {
      min-height: 100vh;
      min-height: 100svh;
      padding: 90px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .form-card {
      width: min(92vw, 500px);
      padding: 40px 34px 34px;
      border-radius: 30px;
      background: rgba(255,255,255,0.20);
      border: 1px solid rgba(255,255,255,0.42);
      backdrop-filter: blur(22px) saturate(1.35);
      -webkit-backdrop-filter: blur(22px) saturate(1.35);
      box-shadow: 0 24px 70px rgba(0,0,0,0.22);
    }

    .form-card h1 {
      text-align: center;
      font-size: 30px;
      margin-bottom: 8px;
      font-weight: 800;
      color: #fff;
      text-shadow: 0 2px 10px rgba(0,0,0,0.25);
    }

    .form-card p {
      text-align: center;
      font-size: 15px;
      line-height: 1.45;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.22);
      margin-bottom: 30px;
    }

    .field-label {
      display: block;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 9px;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }

    input[type="text"] {
      width: 100%;
      height: 56px;
      padding: 0 16px;
      border: 1px solid rgba(255,255,255,0.65);
      outline: none;
      border-radius: 16px;
      font-size: 17px;
      margin-bottom: 25px;
      background: rgba(255,255,255,0.92);
      color: #111;
    }

    input[type="text"]::placeholder {
      color: rgba(0,0,0,0.45);
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 13px;
      margin: 10px 0 30px;
    }

    .option {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 56px;
      padding: 15px;
      border-radius: 16px;
      background: rgba(255,255,255,0.22);
      border: 1px solid rgba(255,255,255,0.38);
      cursor: pointer;
      transition: 0.2s ease;
      font-size: 16px;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.22);
    }

    .option:hover {
      background: rgba(255,255,255,0.32);
      transform: translateY(-1px);
    }

    .option input {
      transform: scale(1.25);
      accent-color: #fff;
    }

    button {
      width: 100%;
      height: 56px;
      border: none;
      border-radius: 999px;
      background: #fff;
      color: #111;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.26);
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .message {
      display: none;
      text-align: center;
      margin-top: 18px;
      font-size: 15px;
      line-height: 1.45;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }

    @media (max-width: 768px) {
      .fixed-bg {
        background-position: center;
      }

      .hero {
        padding: 34px 18px;
      }

      .logo {
        width: 88vw;
        max-height: 78svh;
      }

      .form-section {
        padding: 70px 18px;
      }

      .form-card {
        width: 100%;
        padding: 30px 22px 26px;
        border-radius: 24px;
      }

      .form-card h1 {
        font-size: 26px;
      }

      .form-card p {
        font-size: 15px;
      }

      input[type="text"],
      button,
      .option {
        min-height: 56px;
      }
    }
  </style>
</head>

<body>
  <div class="fixed-bg"></div>

  <section class="hero">
    <img
      src="LOGO VERTICAL DATA.png"
      alt="Isapalooza 25ª Edição"
      class="logo"
    />
    <div class="scroll">role para confirmar ↓</div>
  </section>

  <section class="form-section">
    <form class="form-card" id="rsvpForm">
      <h1>Confirme sua presença</h1>
      <p>Preencha seu nome e informe se poderá participar.</p>

      <label class="field-label" for="nome">Seu nome</label>
      <input
        type="text"
        id="nome"
        name="nome"
        placeholder="Digite seu nome"
        autocomplete="name"
        required
      />

      <span class="field-label">Você pode participar?</span>

      <div class="options">
        <label class="option">
          <input type="radio" name="confirmacao" value="Estarei lá!" required />
          Estarei lá!
        </label>

        <label class="option">
          <input type="radio" name="confirmacao" value="Não poderei ir :(" required />
          Não poderei ir :(
        </label>
      </div>

      <button type="submit" id="submitBtn">Confirmar presença</button>

      <div class="message" id="successMessage">
        Resposta registrada com sucesso.
      </div>

      <div class="message" id="errorMessage">
        Não foi possível enviar. Tente novamente.
      </div>
    </form>
  </section>

  <script>
    const SCRIPT_URL =
      "https://script.google.com/macros/s/AKfycbwGV9r-bYhEhPv15oh_a_S8FLI_tpJcskY1IENvp0egWhdawSp68uY_9UkpVUxmTV_2/exec";

    const form = document.getElementById("rsvpForm");
    const submitBtn = document.getElementById("submitBtn");
    const successMessage = document.getElementById("successMessage");
    const errorMessage = document.getElementById("errorMessage");

    form.addEventListener("submit", async function(event) {
      event.preventDefault();

      successMessage.style.display = "none";
      errorMessage.style.display = "none";

      const nome = document.getElementById("nome").value.trim();
      const confirmacaoInput = document.querySelector('input[name="confirmacao"]:checked');
      const confirmacao = confirmacaoInput ? confirmacaoInput.value : "";

      if (!nome || !confirmacao) {
        errorMessage.textContent = "Preencha todos os campos.";
        errorMessage.style.display = "block";
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Enviando...";

      try {
        await fetch(SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            nome: nome,
            confirmacao: confirmacao
          })
        });

        form.reset();
        successMessage.style.display = "block";
      } catch (error) {
        errorMessage.textContent = "Não foi possível enviar. Tente novamente.";
        errorMessage.style.display = "block";
      }

      submitBtn.disabled = false;
      submitBtn.textContent = "Confirmar presença";
    });
  </script>
</body>
</html>
