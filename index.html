<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Isapalooza 25ª Edição</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
      overflow-x: hidden;
      background: #000;
    }

    .fixed-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      background-image: url("BACKGROUND.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      animation: zoomBg 22s ease-in-out infinite alternate;
    }

    @keyframes zoomBg {
      from { transform: scale(1); }
      to { transform: scale(1.06); }
    }

    .hero {
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
    }

    .logo {
      width: min(88vw, 470px);
      max-height: 82vh;
      max-height: 82svh;
      object-fit: contain;
      animation: floatLogo 4s ease-in-out infinite;
      filter: drop-shadow(0 18px 36px rgba(0,0,0,0.45));
    }

    @keyframes floatLogo {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .scroll {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      opacity: 0.95;
      white-space: nowrap;
      text-shadow: 0 2px 10px rgba(0,0,0,0.45);
      animation: bounce 1.8s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translate(-50%, 0); }
      50% { transform: translate(-50%, 8px); }
    }

    .form-section {
      min-height: 100vh;
      min-height: 100svh;
      padding: 90px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .form-card {
      width: min(92vw, 500px);
      padding: 40px 34px 34px;
      border-radius: 30px;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.38);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      box-shadow: 0 24px 80px rgba(0,0,0,0.26);
    }

    .form-card h1 {
      text-align: center;
      font-size: 30px;
      margin-bottom: 8px;
      font-weight: 800;
      color: #fff;
      text-shadow: 0 2px 10px rgba(0,0,0,0.25);
    }

    .form-card p {
      text-align: center;
      font-size: 15px;
      line-height: 1.45;
      color: #fff;
      margin-bottom: 30px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }

    .field-label {
      display: block;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 9px;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }

    input[type="text"] {
      width: 100%;
      height: 56px;
      padding: 0 16px;
      border: none;
      outline: none;
      border-radius: 16px;
      font-size: 17px;
      margin-bottom: 25px;
      background: rgba(255,255,255,0.96);
      color: #111;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 13px;
      margin: 10px 0 30px;
    }

    .option {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 58px;
      padding: 15px;
      border-radius: 16px;
      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.22);
      cursor: pointer;
      transition: 0.2s ease;
      font-size: 16px;
      user-select: none;
    }

    .option:hover {
      background: rgba(255,255,255,0.25);
    }

    .option.selected {
      background: linear-gradient(135deg,#ff6a00,#ff8c00);
      border: 1px solid #ffb347;
      color: white;
      box-shadow:
        0 0 30px rgba(255,106,0,.55),
        0 15px 35px rgba(255,106,0,.35);
      transform: scale(1.02);
    }

    .option input {
      width: 18px;
      height: 18px;
      accent-color: #fff;
      cursor: pointer;
    }

    button {
      width: 100%;
      height: 56px;
      border: none;
      border-radius: 999px;
      background: #fff;
      color: #111;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.28);
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .secondary-btn {
      margin-top: 12px;
      background: rgba(255,255,255,0.2);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.45);
    }

    .message {
      display: none;
      text-align: center;
      margin-top: 18px;
      font-size: 15px;
      line-height: 1.45;
    }

    .error { color: #ffd1d1; }

    @media (max-width: 768px) {
      .hero { padding: 34px 18px; }

      .logo {
        width: 88vw;
        max-height: 78svh;
      }

      .form-section { padding: 70px 18px; }

      .form-card {
        width: 100%;
        padding: 30px 22px 26px;
        border-radius: 24px;
      }

      .form-card h1 { font-size: 26px; }
      .form-card p { font-size: 15px; }

      input[type="text"],
      button,
      .option {
        min-height: 56px;
      }
    }
  </style>
</head>

<body>
  <div class="fixed-bg"></div>

  <section class="hero">
    <img src="LOGO VERTICAL DATA.png" alt="Isapalooza 25ª Edição" class="logo" />
    <div class="scroll">role para confirmar ↓</div>
  </section>

  <section class="form-section">
    <form class="form-card" id="rsvpForm">
      <h1>Confirme sua presença</h1>
      <p>Preencha seu nome e informe se poderá participar.</p>

      <label class="field-label" for="nome">Seu nome</label>

      <input
        type="text"
        id="nome"
        name="nome"
        placeholder="Digite seu nome"
        autocomplete="name"
        required
      />

      <span class="field-label">Você pode participar?</span>

      <div class="options">
        <label class="option">
          <input type="radio" name="confirmacao" value="Estarei lá!" required />
          Estarei lá!
        </label>

        <label class="option">
          <input type="radio" name="confirmacao" value="Não poderei ir :(" required />
          Não poderei ir :(
        </label>
      </div>

      <button type="submit" id="submitBtn">Enviar resposta</button>

      <div class="message error" id="errorMessage">
        Não foi possível enviar. Tente novamente.
      </div>
    </form>
  </section>

  <script>
    const FORM_URL =
      "https://docs.google.com/forms/d/e/1FAIpQLSe6lzEsgTwJOuQMmhLTwuTEaDGdxe8BAsNIUIaBBX-NQxx9Ow/formResponse";

    const form = document.getElementById("rsvpForm");
    const submitBtn = document.getElementById("submitBtn");
    const errorMessage = document.getElementById("errorMessage");
    const options = document.querySelectorAll(".option");

    options.forEach(option => {
      const radio = option.querySelector("input");

      option.addEventListener("click", () => {
        radio.checked = true;
        options.forEach(o => o.classList.remove("selected"));
        option.classList.add("selected");
      });

      radio.addEventListener("change", () => {
        options.forEach(o => o.classList.remove("selected"));
        if (radio.checked) option.classList.add("selected");
      });
    });

    form.addEventListener("submit", async function(event) {
      event.preventDefault();

      errorMessage.style.display = "none";

      const nome = document.getElementById("nome").value.trim();
      const confirmacaoInput = document.querySelector('input[name="confirmacao"]:checked');
      const confirmacao = confirmacaoInput ? confirmacaoInput.value : "";

      if (!nome || !confirmacao) {
        errorMessage.textContent = "Preencha todos os campos.";
        errorMessage.style.display = "block";
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Enviando...";

      const formData = new FormData();

      formData.append("entry.1498135098", nome);
      formData.append("entry.877086558", confirmacao);

      try {
        await fetch(FORM_URL, {
          method: "POST",
          mode: "no-cors",
          body: formData
        });

        form.innerHTML = `
          <h1>Resposta enviada!</h1>
          <p>Sua confirmação foi registrada com sucesso.</p>

          <button type="button" onclick="window.location.reload()">
            Recomeçar
          </button>

          <button type="button" class="secondary-btn" onclick="window.scrollTo({ top: 0, behavior: 'smooth' })">
            Encerrar
          </button>
        `;

      } catch (error) {
        errorMessage.textContent = "Não foi possível enviar. Tente novamente.";
        errorMessage.style.display = "block";
        submitBtn.disabled = false;
        submitBtn.textContent = "Enviar resposta";
      }
    });
  </script>
</body>
</html>
